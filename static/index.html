<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Compare</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

    header { background: #1a1a2e; color: white; padding: 16px 24px; }
    header h1 { font-size: 1.2rem; font-weight: 600; }

    .input-area { background: white; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; display: flex; gap: 12px; }
    textarea { flex: 1; border: 1px solid #ccc; border-radius: 8px; padding: 10px 14px; font-size: 14px; resize: none; height: 72px; }
    textarea:focus { outline: none; border-color: #5c6bc0; }
    button { background: #5c6bc0; color: white; border: none; border-radius: 8px; padding: 0 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    button:hover { background: #3f51b5; }
    button:disabled { background: #9fa8da; cursor: not-allowed; }

    .results { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 130px); }
    .panel { display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; }
    .panel:last-child { border-right: none; }

    .panel-header { padding: 12px 20px; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; border-bottom: 1px solid #e0e0e0; }
    .claude-header { background: #fff8e1; color: #e65100; }
    .gpt-header { background: #e8f5e9; color: #2e7d32; }

    .panel-body { flex: 1; overflow-y: auto; padding: 20px; white-space: pre-wrap; font-size: 14px; line-height: 1.7; }
    .placeholder { color: #aaa; font-style: italic; }

    .error { color: #c62828; background: #ffebee; padding: 12px; border-radius: 6px; font-size: 13px; }

    .loading { display: flex; align-items: center; gap: 8px; color: #888; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #888; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <header><h1>LLM Compare — Claude vs ChatGPT</h1></header>

  <div class="input-area">
    <textarea id="input" placeholder="メッセージを入力してください..." rows="3"></textarea>
    <button id="sendBtn" onclick="sendQuery()">送信</button>
  </div>

  <div class="results">
    <div class="panel">
      <div class="panel-header claude-header">Claude (Opus 4.7)</div>
      <div class="panel-body" id="claudeResult">
        <span class="placeholder">回答がここに表示されます</span>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header gpt-header">ChatGPT (GPT-4o)</div>
      <div class="panel-body" id="gptResult">
        <span class="placeholder">回答がここに表示されます</span>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) sendQuery();
    });

    async function sendQuery() {
      const message = input.value.trim();
      if (!message) return;

      sendBtn.disabled = true;
      const loading = `<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      document.getElementById('claudeResult').innerHTML = loading;
      document.getElementById('gptResult').innerHTML = loading;

      try {
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();

        document.getElementById('claudeResult').textContent = data.claude || '';
        document.getElementById('gptResult').textContent = data.gpt || '';

        if (data.error) {
          const errEl = document.createElement('div');
          errEl.className = 'error';
          errEl.textContent = data.error;
          if (!data.claude) document.getElementById('claudeResult').appendChild(errEl);
          if (!data.gpt) document.getElementById('gptResult').appendChild(errEl.cloneNode(true));
        }
      } catch (e) {
        const errHtml = `<div class="error">通信エラー: ${e.message}</div>`;
        document.getElementById('claudeResult').innerHTML = errHtml;
        document.getElementById('gptResult').innerHTML = errHtml;
      } finally {
        sendBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
